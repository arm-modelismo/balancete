<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balancete ARM - Gestão Cloud</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b1f3a">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        *{box-sizing:border-box;}
        :root{
            --bg:#0b1f3a;
            --card:#122b52;
            --text:#ffffff;
            --accent:#facc15;
            --result:#1e3a8a;
            --input-bg:#0b1f3a;
            --success:#4ade80;
        }

        body{ font-family:Arial,sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; }
        .container{ max-width:650px; margin:auto; }
        
        .header-logo {
            display: block;
            margin: 0 auto 10px auto;
            max-width: 80px;
            height: auto;
            border-radius: 10px;
        }

        h1{text-align:center; font-size:20px; margin-bottom:5px;}
        h2{text-align:center; font-size:14px; opacity:0.8; margin-top:0; margin-bottom:15px;}
        .card{background:var(--card); padding:12px; border-radius:12px; margin-bottom:10px; position: relative;}
        input,select{ width:100%; padding:8px; margin:4px 0; border-radius:6px; border:none; background:var(--input-bg); color:var(--text); font-size:14px;}
        button{ border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
        
        .btn-save{ width:100%; padding:12px; margin-top:8px; background:var(--success); color:black; font-size:15px;}
        .btn-main{ width:100%; padding:12px; margin-top:5px; background:var(--accent); color:black; font-size:15px;}
        
        .btn-add{ background:#3b82f6; color:white; padding:5px 12px; font-size:11px; float:right; margin-bottom:5px;}
        .btn-del{ background:#ef4444; color:white; padding:2px 8px; border-radius:4px; font-size:10px; margin-left:5px;}
        .btn-refresh { background: #3b82f6; color: white; padding: 8px; border-radius: 6px; font-size: 14px; line-height: 1; }

        .tabela{width:100%; border-collapse:collapse; clear:both;}
        .tabela td, .tabela th{padding:5px; border-bottom:1px solid #ffffff22; text-align:left; font-size:13px;}
        .resultado{background:var(--result); padding:10px; border-radius:8px; margin-top:8px; font-size:14px;}
        
        .obs-container { margin-top: 15px; }
        .obs-container h3 { font-size: 14px; margin-bottom: 5px; color: var(--accent); }
        .textarea-obs { 
            width: 100%; 
            min-height: 80px; 
            background: var(--input-bg); 
            color: var(--text); 
            border: 1px solid #ffffff22; 
            border-radius: 8px; 
            padding: 10px; 
            font-family: inherit; 
            font-size: 13px; 
            resize: none; 
            overflow: hidden;
        }

        @media print {
            @page { size: A4; margin: 10mm; }
            body { background: white !important; color: black !important; padding: 0; }
            .container { max-width: 100%; height: 270mm; padding: 5mm; overflow: hidden; }
            .card { background: white !important; padding: 0; margin-bottom: 15px; color: black !important; }
            .btn-add, .btn-main, .btn-del, .btn-save, .btn-refresh { display: none !important; }
            input, select, .textarea-obs { border: none !important; background: transparent !important; color: black !important; padding: 0 !important; font-weight: bold; }
            .tabela { border: 1px solid black !important; }
            .tabela td, .tabela th { border: 1px solid black !important; color: black !important; padding: 4px; }
            .resultado { color: black !important; background: #f0f0f0 !important; border: 1px solid #000; margin-top: 4px; }
            h1, h2, h3, .header-logo { color: black !important; margin: 5px 0; }
        }
    </style>
</head>

<body>

<div class="container" id="balancete">
    <div style="text-align: center; font-size: 30px;">✈️</div>
    <img src="logo.png" alt="" class="header-logo" onerror="this.style.display='none'">
    
    <h1>ASSOCIAÇÃO REGIONAL DE MODELISMO</h1>
    <h2>Balancete Financeiro</h2>

    <div class="card">
        <div style="display:flex; gap:5px; max-width: 300px;">
            <div style="flex:2">
                <label style="font-size:11px">Mês:</label>
                <select id="mes" onchange="buscarSaldoAnterior()">
                    <option>Janeiro</option><option>Fevereiro</option><option>Março</option>
                    <option>Abril</option><option>Maio</option><option>Junho</option>
                    <option>Julho</option><option>Agosto</option><option>Setembro</option>
                    <option>Outubro</option><option>Novembro</option><option>Dezembro</option>
                </select>
            </div>
            <div style="flex:1">
                <label style="font-size:11px">Ano:</label>
                <input type="number" id="ano" oninput="buscarSaldoAnterior()">
            </div>
        </div>
    </div>

    <div class="card">
        <button class="btn-add" onclick="adicionarItem('tabelaReceitas', 'receita')">+ Adicionar</button>
        <h3 style="font-size:14px; margin:0 0 10px 0;">Receitas</h3>
        <table class="tabela" id="tabelaReceitas">
            <tbody>
                <tr>
                    <td>Caixa Anterior</td>
                    <td style="width:160px;">
                        <div style="display:flex; gap:5px; align-items:center;">
                            <input type="text" id="caixaAnterior" value="R$ 0,00" class="receita" oninput="mascaraMoeda(this)">
                            <button type="button" onclick="buscarSaldoAnterior()" class="btn-refresh">🔄</button>
                        </div>
                    </td>
                    <td style="width:30px;"></td>
                </tr>
                <tr>
                    <td>Mensalidades</td>
                    <td><input type="text" value="R$ 0,00" class="receita" oninput="mascaraMoeda(this)"></td>
                    <td></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <button class="btn-add" onclick="adicionarItem('tabelaDespesas', 'despesa')">+ Adicionar</button>
        <h3 style="font-size:14px; margin:0 0 10px 0;">Despesas</h3>
        <table class="tabela" id="tabelaDespesas">
            <tbody>
                <tr>
                    <td>Aluguel</td>
                    <td style="width:160px;"><input type="text" value="R$ 0,00" class="despesa" oninput="mascaraMoeda(this)"></td>
                    <td style="width:30px;"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <div class="resultado">Receitas: <b id="totalReceita">R$ 0,00</b></div>
        <div class="resultado">Despesas: <b id="totalDespesa">R$ 0,00</b></div>
        <div class="resultado" style="background:var(--accent); color:black;">
            Saldo Final: <b id="saldoFinal">R$ 0,00</b>
        </div>

        <div class="obs-container">
            <h3>Observações:</h3>
            <textarea class="textarea-obs" id="obs" placeholder="Notas do mês..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        </div>
        
        <button class="btn-save" id="btnSalvar" onclick="salvarParaPlanilha()">Guardar no Google Sheets</button>
        <button class="btn-main" onclick="window.print()">Imprimir / Gerar PDF</button>
    </div>
</div>

<script>
const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbzpAcX4dApu3iK3DG3uLuPAz61NMTzzkWRQ-mHhwqWby_rUECu7bp0DO9VvHSFqUk-z/exec";

function mascaraMoeda(campo) {
    let valor = campo.value.replace(/\D/g, "");
    valor = (valor / 100).toFixed(2) + "";
    valor = valor.replace(".", ",");
    valor = valor.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
    valor = valor.replace(/(\d)(\d{3}),/g, "$1.$2,");
    campo.value = "R$ " + valor;
    calcular();
}

function stringParaNumero(str) {
    if (!str) return 0;
    let n = str.replace("R$", "").replace(/\./g, "").replace(",", ".").trim();
    return parseFloat(n) || 0;
}

function formatarReal(n) {
    return n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function calcular() {
    let r = 0, d = 0;
    document.querySelectorAll(".receita").forEach(i => r += stringParaNumero(i.value));
    document.querySelectorAll(".despesa").forEach(i => d += stringParaNumero(i.value));
    
    document.getElementById("totalReceita").innerText = formatarReal(r);
    document.getElementById("totalDespesa").innerText = formatarReal(d);
    
    let saldo = r - d;
    let campoSaldo = document.getElementById("saldoFinal");
    campoSaldo.innerText = formatarReal(saldo);
    campoSaldo.style.color = saldo < 0 ? "red" : "black";
}

function adicionarItem(tabelaId, classe) {
    let tbody = document.getElementById(tabelaId).querySelector("tbody");
    let row = tbody.insertRow();
    row.insertCell(0).innerHTML = '<input type="text" placeholder="Descrição">';
    row.insertCell(1).innerHTML = `<input type="text" value="R$ 0,00" class="${classe}" oninput="mascaraMoeda(this)">`;
    row.insertCell(2).innerHTML = '<button class="btn-del" onclick="this.parentElement.parentElement.remove();calcular()">X</button>';
}

async function salvarParaPlanilha() {
    const btn = document.getElementById("btnSalvar");
    btn.innerText = "A guardar..."; btn.disabled = true;
    
    const dados = {
        action: "salvar",
        chave: `${document.getElementById("ano").value}_${document.getElementById("mes").value}`,
        saldoFinal: document.getElementById("saldoFinal").innerText,
        receitas: Array.from(document.querySelectorAll("#tabelaReceitas tbody tr")).map(tr => ({
            desc: tr.cells[0].querySelector("input")?.value || tr.cells[0].innerText,
            val: tr.cells[1].querySelector("input").value
        })),
        despesas: Array.from(document.querySelectorAll("#tabelaDespesas tbody tr")).map(tr => ({
            desc: tr.cells[0].querySelector("input")?.value || tr.cells[0].innerText,
            val: tr.cells[1].querySelector("input").value
        }))
    };

    try {
        await fetch(URL_GOOGLE, { method: "POST", mode: "no-cors", body: JSON.stringify(dados) });
        alert("Enviado com sucesso!");
    } catch (e) { alert("Erro ao guardar."); }
    btn.innerText = "Guardar no Google Sheets"; btn.disabled = false;
}

async function buscarSaldoAnterior() {
    const mes = document.getElementById("mes").value;
    const ano = parseInt(document.getElementById("ano").value);
    const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    const idx = meses.indexOf(mes);
    let mAnt = idx === 0 ? meses[11] : meses[idx-1];
    let aAnt = idx === 0 ? ano - 1 : ano;

    try {
        const res = await fetch(`${URL_GOOGLE}?chave=${aAnt}_${mAnt}`);
        const data = await res.json();
        if (data && data.saldo) {
            document.getElementById("caixaAnterior").value = data.saldo;
            calcular();
        }
    } catch (e) { console.log("Sem saldo anterior."); }
}

window.onload = () => {
    const hoje = new Date();
    document.getElementById("mes").value = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"][hoje.getMonth()];
    document.getElementById("ano").value = hoje.getFullYear();
    buscarSaldoAnterior();
    calcular();
};
</script>
</body>
</html>
