<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balancete ARM - Gestão Cloud</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b1f3a">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135706.png">

    <style>
        *{box-sizing:border-box;}
        :root{
            --bg:#0b1f3a;
            --card:#122b52;
            --text:#ffffff;
            --accent:#facc15;
            --result:#1e3a8a;
            --input-bg:#0b1f3a;
        }

        /* ESTILO TELA */
        body{ font-family:Arial,sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; }
        .container{ max-width:650px; margin:auto; }
        h1{text-align:center; font-size:20px; margin-bottom:5px;}
        h2{text-align:center; font-size:14px; opacity:0.8; margin-top:0; margin-bottom:15px;}
        .card{background:var(--card); padding:12px; border-radius:12px; margin-bottom:10px; position: relative;}
        input,select{ width:100%; padding:8px; margin:4px 0; border-radius:6px; border:none; background:var(--input-bg); color:var(--text); font-size:14px;}
        button{ border:none; border-radius:8px; font-weight:bold; cursor:pointer; }
        
        .btn-main{ width:100%; padding:12px; margin-top:8px; background:var(--accent); color:black; font-size:15px;}
        .btn-save{ width:100%; padding:12px; margin-top:5px; background:#4ade80; color:black; font-size:15px;}
        .btn-add{ background:#3b82f6; color:white; padding:5px 12px; font-size:11px; float:right; margin-bottom:5px;}
        .btn-del{ background:#ef4444; color:white; padding:2px 8px; border-radius:4px; font-size:10px; margin-left:5px;}

        .tabela{width:100%; border-collapse:collapse; clear:both;}
        .tabela td, .tabela th{padding:5px; border-bottom:1px solid #ffffff22; text-align:left; font-size:13px;}
        .resultado{background:var(--result); padding:10px; border-radius:8px; margin-top:8px; font-size:14px;}
        .clearfix::after { content: ""; clear: both; display: table; }

        /* ESTILO IMPRESSÃO (A4 270mm) */
        @media print {
            @page { size: A4; margin: 10mm; }
            body { background: white !important; color: black !important; padding: 0; }
            .container { max-width: 100%; height: 270mm; padding: 5mm; overflow: hidden; }
            .card { background: white !important; padding: 0; margin-bottom: 15px; color: black !important; }
            .btn-add, .btn-main, .btn-del, .btn-save { display: none !important; }
            input, select { border: none !important; background: transparent !important; color: black !important; padding: 0 !important; font-weight: bold; appearance: none; }
            .tabela { border: 1px solid black !important; }
            .tabela td, .tabela th { border: 1px solid black !important; color: black !important; padding: 4px; }
            .resultado { color: black !important; background: #f0f0f0 !important; border: 1px solid #000; margin-top: 4px; }
            h1, h2, h3 { color: black !important; margin: 5px 0; }
        }
    </style>
</head>

<body>

<div class="container" id="balancete">
    <h1>ASSOCIAÇÃO REGIONAL DE MODELISMO</h1>
    <h2>Balancete Financeiro</h2>

    <div class="card">
        <div style="display:flex; gap:5px; max-width: 300px;">
            <div style="flex:2">
                <label style="font-size:11px">Mês:</label>
                <select id="mes" onchange="buscarSaldoAnterior()">
                    <option>Janeiro</option><option>Fevereiro</option><option>Março</option>
                    <option>Abril</option><option>Maio</option><option>Junho</option>
                    <option>Julho</option><option>Agosto</option><option>Setembro</option>
                    <option>Outubro</option><option>Novembro</option><option>Dezembro</option>
                </select>
            </div>
            <div style="flex:1">
                <label style="font-size:11px">Ano:</label>
                <input type="number" id="ano" oninput="buscarSaldoAnterior()">
            </div>
        </div>
    </div>

    <div class="card clearfix">
        <button class="btn-add" onclick="adicionarItem('tabelaReceitas', 'receita')">+ Adicionar</button>
        <h3 style="font-size:14px; margin:0 0 10px 0;">Receitas</h3>
        <table class="tabela" id="tabelaReceitas">
            <tbody>
                <tr>
                    <td>Caixa Anterior</td>
                    <td style="width:140px;"><input type="text" id="caixaAnterior" value="R$ 0,00" class="receita" oninput="mascaraMoeda(this)"></td>
                    <td style="width:30px;"></td>
                </tr>
                <tr>
                    <td>Mensalidades</td>
                    <td><input type="text" value="R$ 0,00" class="receita" oninput="mascaraMoeda(this)"></td>
                    <td></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="card clearfix">
        <button class="btn-add" onclick="adicionarItem('tabelaDespesas', 'despesa')">+ Adicionar</button>
        <h3 style="font-size:14px; margin:0 0 10px 0;">Despesas</h3>
        <table class="tabela" id="tabelaDespesas">
            <tbody>
                <tr>
                    <td>Aluguel</td>
                    <td style="width:140px;"><input type="text" value="R$ 1.600,00" class="despesa" oninput="mascaraMoeda(this)"></td>
                    <td style="width:30px;"></td>
                </tr>
                <tr>
                    <td>Jardinagem</td>
                    <td><input type="text" value="R$ 850,00" class="despesa" oninput="mascaraMoeda(this)"></td>
                    <td></td>
                </tr>
                <tr>
                    <td>Água / Luz / Contab.</td>
                    <td><input type="text" value="R$ 250,00" class="despesa" oninput="mascaraMoeda(this)"></td>
                    <td></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <div class="resultado">Receitas: <b id="totalReceita">R$ 0,00</b></div>
        <div class="resultado">Despesas: <b id="totalDespesa">R$ 0,00</b></div>
        <div class="resultado" style="background:var(--accent); color:black;">
            Saldo: <b id="saldoFinal">R$ 0,00</b>
        </div>
        <button class="btn-main" onclick="window.print()">Imprimir / Gerar PDF</button>
        <button class="btn-save" id="btnSalvar" onclick="salvarParaPlanilha()">Guardar no Google Sheets</button>
    </div>
</div>

<script>
// --- REGISTRO DO SERVICE WORKER (PWA) ---
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
    .then(() => console.log("PWA Ativo"))
    .catch(err => console.log("Erro PWA", err));
}

// --- CONFIGURAÇÃO ---
const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbzpAcX4dApu3iK3DG3uLuPAz61NMTzzkWRQ-mHhwqWby_rUECu7bp0DO9VvHSFqUk-z/exec";

function mascaraMoeda(campo) {
    let valor = campo.value.replace(/\D/g, "");
    valor = (valor / 100).toFixed(2) + "";
    valor = valor.replace(".", ",");
    valor = valor.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
    valor = valor.replace(/(\d)(\d{3}),/g, "$1.$2,");
    campo.value = "R$ " + valor;
    calcular();
}

function stringParaNumero(valorStr) {
    if (!valorStr) return 0;
    let limpo = valorStr.replace("R$", "").replace(/\./g, "").replace(",", ".").trim();
    return parseFloat(limpo) || 0;
}

function formatarReal(valor) {
    return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function calcular() {
    let receitas = document.querySelectorAll(".receita");
    let despesas = document.querySelectorAll(".despesa");
    let tr = 0, td = 0;
    receitas.forEach(c => tr += stringParaNumero(c.value));
    despesas.forEach(c => td += stringParaNumero(c.value));
    document.getElementById("totalReceita").innerText = formatarReal(tr);
    document.getElementById("totalDespesa").innerText = formatarReal(td);
    document.getElementById("saldoFinal").innerText = formatarReal(tr - td);
}

function adicionarItem(idTabela, classeInput) {
    let tabela = document.getElementById(idTabela).getElementsByTagName('tbody')[0];
    let linha = tabela.insertRow();
    linha.insertCell(0).innerHTML = '<input type="text" placeholder="Descrição">';
    linha.insertCell(1).innerHTML = `<input type="text" value="R$ 0,00" class="${classeInput}" oninput="mascaraMoeda(this)">`;
    linha.insertCell(2).innerHTML = '<button class="btn-del" onclick="removerLinha(this)">X</button>';
    calcular();
}

function removerLinha(botao) {
    botao.parentNode.parentNode.remove();
    calcular();
}

// --- INTEGRAÇÃO GOOGLE SHEETS ---
async function salvarParaPlanilha() {
    const btn = document.getElementById("btnSalvar");
    const mes = document.getElementById("mes").value;
    const ano = document.getElementById("ano").value;
    
    const dados = {
        action: "salvar",
        chave: `${ano}_${mes}`,
        saldoFinal: stringParaNumero(document.getElementById("saldoFinal").innerText),
        receitas: Array.from(document.querySelectorAll("#tabelaReceitas tbody tr")).map(tr => ({
            desc: tr.cells[0].querySelector("input")?.value || tr.cells[0].innerText,
            val: tr.cells[1].querySelector("input").value
        })),
        despesas: Array.from(document.querySelectorAll("#tabelaDespesas tbody tr")).map(tr => ({
            desc: tr.cells[0].querySelector("input")?.value || tr.cells[0].innerText,
            val: tr.cells[1].querySelector("input").value
        }))
    };

    btn.innerText = "A enviar...";
    btn.disabled = true;

    try {
        await fetch(URL_GOOGLE, {
            method: "POST",
            mode: "no-cors", 
            cache: "no-cache",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dados)
        });
        alert("Comando enviado! Os dados aparecerão na folha de cálculo em instantes.");
    } catch (e) {
        alert("Erro técnico ao enviar. Verifique a sua ligação.");
    } finally {
        btn.innerText = "Guardar no Google Sheets";
        btn.disabled = false;
    }
}

async function buscarSaldoAnterior() {
    const mes = document.getElementById("mes").value;
    const ano = document.getElementById("ano").value;
    const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    const idx = meses.indexOf(mes);
    
    const mesAnt = idx === 0 ? meses[11] : meses[idx - 1];
    const anoAnt = idx === 0 ? ano - 1 : ano;
    const chaveAnterior = `${anoAnt}_${mesAnt}`;

    try {
        const res = await fetch(`${URL_GOOGLE}?chave=${chaveAnterior}`);
        const data = await res.json();
        if (data && data.saldo) {
            document.getElementById("caixaAnterior").value = formatarReal(data.saldo);
            calcular();
        }
    } catch (e) {
        console.log("Saldo anterior ainda não existe na nuvem.");
    }
}

function configurarData() {
    const hoje = new Date();
    const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    document.getElementById("mes").value = meses[hoje.getMonth()];
    document.getElementById("ano").value = hoje.getFullYear();
    buscarSaldoAnterior();
}

configurarData();
calcular();
</script>

</body>
</html>
